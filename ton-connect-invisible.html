<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <script>
        // الحصول على المعاملات من البوت
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const amount = urlParams.get('amount') || '0.05';
        const ownerWallet = urlParams.get('owner_wallet');
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let connector = null;
        
        async function initTONConnect() {
            try {
                connector = new TonConnectSDK.TonConnect();
                
                // الاتصال بالمحفظة
                const wallets = await connector.getWallets();
                const tonkeeper = wallets.find(w => w.name === 'Tonkeeper');
                
                if (tonkeeper) {
                    const link = connector.connect({
                        universalLink: tonkeeper.universalLink,
                        bridgeUrl: tonkeeper.bridgeUrl
                    });
                    
                    // فتح نافذة ربط المحفظة
                    tg.openTelegramLink(link);
                    
                    // انتظار التأكيد
                    await connector.restoreConnection();
                    
                    // إنشاء فاتورة دفع
                    const transaction = {
                        validUntil: Math.floor(Date.now() / 1000) + 600,
                        messages: [{
                            address: ownerWallet,
                            amount: (parseFloat(amount) * 1000000000).toString()
                        }]
                    };
                    
                    const result = await connector.sendTransaction(transaction);
                    
                    // إرسال التأكيد إلى السيرفر
                    await fetch('/api/confirm-ton-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, txHash: result.boc })
                    });
                    
                    // إغلاق التطبيق المصغر بنجاح
                    tg.close();
                }
            } catch (error) {
                console.error('Error:', error);
                tg.close();
            }
        }
        
        initTONConnect();
    </script>
</head>
<body style="display:none;"></body>
</html>
