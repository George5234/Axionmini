<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        body { display: none; }
    </style>
</head>
<body>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const paymentId = urlParams.get('payment_id');
        const amount = parseFloat(urlParams.get('amount')) || 0.05;
        const ownerWallet = urlParams.get('owner_wallet');
        
        if (!userId || !paymentId || !ownerWallet) {
            console.error('Missing parameters');
            tg.close();
        }
        
        let connector = null;
        
        async function init() {
            try {
                connector = new TonConnectSDK.TonConnect();
                
                const wallets = await connector.getWallets();
                const tonkeeper = wallets.find(w => w.name === 'Tonkeeper');
                
                if (!tonkeeper) {
                    console.error('No wallet found');
                    await fetch('/api/confirm-ton-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, paymentId, success: false, error: 'No wallet found' })
                    });
                    tg.close();
                    return;
                }
                
                const link = connector.connect({
                    universalLink: tonkeeper.universalLink,
                    bridgeUrl: tonkeeper.bridgeUrl
                });
                
                tg.openTelegramLink(link);
                
                await connector.restoreConnection();
                
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: ownerWallet,
                        amount: (amount * 1000000000).toString()
                    }]
                };
                
                const result = await connector.sendTransaction(transaction);
                
                await fetch('/api/confirm-ton-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, paymentId, txHash: result.boc })
                });
                
                tg.close();
                
            } catch (error) {
                console.error('Error:', error);
                await fetch('/api/confirm-ton-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, paymentId, success: false, error: error.message })
                });
                tg.close();
            }
        }
        
        init();
    </script>
</body>
</html>
