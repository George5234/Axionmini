<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Axion AI • Swap Station</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- TON Connect UI -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0a0f1a 0%, #0a2e1c 50%, #0a0f1a 100%);
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(46, 204, 113, 0.15), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(10, 30, 20, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(46, 204, 113, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 24px 0 16px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #2ecc71, #f1c40f, #2ecc71);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header p {
            color: #8bc34a;
            font-size: 13px;
            margin-top: 6px;
        }

        /* Wallet Section */
        .wallet-section {
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .wallet-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .wallet-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #2ecc71, #1e8a3e);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .wallet-text h4 {
            font-size: 15px;
            font-weight: 600;
        }
        .wallet-text p {
            font-size: 11px;
            color: #8bc34a;
            margin-top: 2px;
        }
        #ton-connect {
            min-width: 140px;
        }

        /* Balance Row */
        .balance-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }
        .balance-card {
            padding: 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(46,204,113,0.1), transparent);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .balance-card:hover::before {
            opacity: 1;
        }
        .balance-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .balance-card .label {
            font-size: 12px;
            color: #8bc34a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .balance-card .value {
            font-size: 28px;
            font-weight: 800;
            margin-top: 6px;
        }
        .balance-card.axc .value { color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.3); }
        .balance-card.usdt .value { color: #2ecc71; text-shadow: 0 0 10px rgba(46,204,113,0.3); }

        /* Lock/Unlock Animation */
        .activation-box {
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(46, 204, 113, 0.4);
            transition: all 0.5s ease;
        }
        .activation-box.locked {
            border-color: rgba(231, 76, 60, 0.4);
        }
        .activation-box.unlocked {
            border-color: rgba(46, 204, 113, 0.6);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
        }
        .activation-box i {
            font-size: 48px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .activation-box.locked i {
            color: #e74c3c;
            animation: shake 0.5s ease;
        }
        .activation-box.unlocked i {
            color: #2ecc71;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .activation-box h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .activation-box p {
            font-size: 13px;
            color: #bdc3c7;
            margin-bottom: 20px;
        }
        .btn-gold {
            background: linear-gradient(145deg, #f1c40f, #d4ac0d);
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            color: #1a2a1a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(241, 196, 15, 0.3);
        }
        .btn-gold:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Swap Box */
        .swap-box {
            padding: 24px;
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }
        .swap-box.disabled {
            opacity: 0.6;
            filter: blur(2px);
            pointer-events: none;
        }
        .swap-input-group {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 20px;
            padding: 16px;
            margin: 10px 0;
            border: 1px solid rgba(46, 204, 113, 0.2);
            transition: all 0.2s;
        }
        .swap-input-group:focus-within {
            border-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
        }
        .swap-label {
            display: flex;
            justify-content: space-between;
            color: #8bc34a;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .swap-input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .swap-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            font-weight: 600;
            outline: none;
        }
        .swap-input-row input[type="number"] {
            -moz-appearance: textfield;
        }
        .swap-input-row input[type="number"]::-webkit-inner-spin-button,
        .swap-input-row input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .swap-input-row input::placeholder {
            color: #4a5a4a;
        }
        .token-badge {
            background: rgba(46, 204, 113, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .swap-arrow {
            text-align: center;
            font-size: 24px;
            color: #2ecc71;
            margin: 5px 0;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }
        .swap-rate {
            text-align: center;
            color: #8bc34a;
            font-size: 12px;
            margin: 15px 0 10px;
        }
        .btn-swap {
            width: 100%;
            background: linear-gradient(145deg, #2ecc71, #1e8a3e);
            border: none;
            border-radius: 40px;
            padding: 16px;
            font-weight: 700;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-swap::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-swap:hover::before {
            left: 100%;
        }
        .btn-swap:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-swap:active:not(:disabled) {
            transform: scale(0.98);
        }

        /* Status Messages */
        .status-msg {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 12px;
            font-size: 13px;
            text-align: center;
            margin: 10px 0;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .status-msg.success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }
        .status-msg.error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }
        .status-msg.info {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid #3498db;
        }

        /* Utilities */
        .hidden { display: none; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        @media (max-width: 450px) {
            body { padding: 12px; }
            .balance-card .value { font-size: 24px; }
            .swap-input-row input { font-size: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    
    <div class="container">
        
        <!-- Header -->
        <div class="header">
            <h1>⚡ AXION SWAP</h1>
            <p>Convert AXC → USDT • Instant • Secure</p>
        </div>

        <!-- Wallet Connection -->
        <div class="card wallet-section" id="walletSection">
            <div class="wallet-info">
                <div class="wallet-icon"><i class="fab fa-telegram-plane"></i></div>
                <div class="wallet-text">
                    <h4>TON Wallet</h4>
                    <p id="walletStatus">Not connected</p>
                </div>
            </div>
            <div id="ton-connect"></div>
        </div>

        <!-- Balances -->
        <div class="balance-row">
            <div class="card balance-card axc">
                <div class="icon"><i class="fas fa-coins"></i></div>
                <div class="label">AXC BALANCE</div>
                <div class="value" id="axcBalance">0</div>
            </div>
            <div class="card balance-card usdt">
                <div class="icon"><i class="fas fa-dollar-sign"></i></div>
                <div class="label">USDT BALANCE</div>
                <div class="value" id="usdtBalance">$0.00</div>
            </div>
        </div>

        <!-- Activation Box (Locked/Unlocked) -->
        <div class="card activation-box locked" id="activationBox">
            <i class="fas fa-lock"></i>
            <h3 id="activationTitle">🔒 Swap Locked</h3>
            <p id="activationDesc">Pay <strong>0.05 TON</strong> one‑time fee to activate swap feature forever</p>
            <button class="btn-gold" id="activateBtn">
                <i class="fas fa-gem"></i> Activate for 0.05 TON
            </button>
            <div id="activationStatus" class="status-msg"></div>
        </div>

        <!-- Swap Interface -->
        <div class="card swap-box disabled" id="swapBox">
            <div class="swap-input-group">
                <div class="swap-label">
                    <span><i class="fas fa-arrow-up-from-bracket"></i> From</span>
                    <span>Balance: <span id="fromBalance">0</span> AXC</span>
                </div>
                <div class="swap-input-row">
                    <input type="number" id="swapFrom" placeholder="0.00" step="1">
                    <div class="token-badge"><i class="fas fa-coins"></i> AXC</div>
                </div>
            </div>

            <div class="swap-arrow"><i class="fas fa-arrow-down"></i></div>

            <div class="swap-input-group">
                <div class="swap-label">
                    <span><i class="fas fa-arrow-down-to-bracket"></i> To</span>
                    <span>Balance: <span id="toBalance">$0.00</span> USDT</span>
                </div>
                <div class="swap-input-row">
                    <input type="text" id="swapTo" placeholder="0.00" readonly>
                    <div class="token-badge" style="background: rgba(46,204,113,0.2);"><i class="fas fa-dollar-sign"></i> USDT</div>
                </div>
            </div>

            <div class="swap-rate">
                1 AXC = $<span id="axcPrice">0.0099</span> USDT • Fee: 0.05 TON (paid once)
            </div>

            <button class="btn-swap" id="swapBtn" disabled>
                <i class="fas fa-exchange-alt"></i> CONFIRM SWAP
            </button>

            <div id="swapStatus" class="status-msg"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
