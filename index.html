<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Axion AI • DEX Swap</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #0a0c0f;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px 16px;
            position: relative;
        }

        /* Animated Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(46, 204, 113, 0.12), transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(241, 196, 15, 0.08), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Glass Card - Premium Version */
        .glass-card {
            background: rgba(18, 25, 22, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(46, 204, 113, 0.05) inset;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(46, 204, 113, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(46, 204, 113, 0.1) inset;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Premium Header */
        .header {
            text-align: center;
            padding: 8px 0 24px;
        }
        .header h1 {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #2ecc71 0%, #f1c40f 50%, #2ecc71 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease infinite;
            letter-spacing: -0.5px;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header p {
            color: #6c8b7a;
            font-size: 13px;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* Wallet Section - Premium */
        .wallet-section {
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            border-radius: 32px;
        }
        .wallet-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .wallet-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #2ecc71, #1a6e3a);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }
        .wallet-text h4 {
            font-size: 15px;
            font-weight: 700;
            color: #f1c40f;
        }
        .wallet-text p {
            font-size: 12px;
            color: #8bc34a;
            margin-top: 4px;
        }
        #ton-connect {
            min-width: 150px;
        }

        /* Balance Cards - Premium DEX Style */
        .balance-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .balance-card {
            padding: 20px 16px;
            text-align: center;
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .balance-card:active {
            transform: scale(0.98);
        }
        .balance-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(46, 204, 113, 0.15), transparent);
            transition: left 0.5s;
        }
        .balance-card:hover::after {
            left: 100%;
        }
        .balance-card .icon {
            font-size: 38px;
            margin-bottom: 12px;
        }
        .balance-card .label {
            font-size: 12px;
            color: #8bc34a;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        .balance-card .value {
            font-size: 28px;
            font-weight: 800;
            margin-top: 8px;
        }
        .balance-card.axc .value { 
            color: #f1c40f; 
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
        }
        .balance-card.usdt .value { 
            color: #2ecc71; 
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
        }

        /* Swap Box - Premium DEX Style */
        .swap-box {
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 40px;
            transition: all 0.3s;
        }
        .swap-box.disabled {
            opacity: 0.7;
            filter: blur(3px);
            pointer-events: none;
        }
        .swap-input-group {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 28px;
            padding: 18px 20px;
            margin: 12px 0;
            border: 1px solid rgba(46, 204, 113, 0.2);
            transition: all 0.25s;
        }
        .swap-input-group:focus-within {
            border-color: #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.15);
            background: rgba(0, 0, 0, 0.55);
        }
        .swap-label {
            display: flex;
            justify-content: space-between;
            color: #8bc34a;
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .swap-input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .swap-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 32px;
            font-weight: 700;
            outline: none;
            font-family: monospace;
            letter-spacing: 0.5px;
        }
        .swap-input-row input[type="number"] {
            -moz-appearance: textfield;
        }
        .swap-input-row input[type="number"]::-webkit-inner-spin-button,
        .swap-input-row input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .swap-input-row input::placeholder {
            color: #3a5a4a;
            font-weight: 500;
        }
        .token-badge {
            background: rgba(46, 204, 113, 0.15);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(46, 204, 113, 0.3);
            backdrop-filter: blur(4px);
        }
        .token-badge i {
            font-size: 18px;
        }
        .swap-arrow {
            text-align: center;
            font-size: 28px;
            color: #2ecc71;
            margin: 8px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .swap-arrow .line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2ecc71, transparent);
        }
        .swap-rate {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 14px;
            border-radius: 28px;
            color: #f1c40f;
            font-size: 13px;
            margin: 20px 0 16px;
            font-weight: 500;
        }
        .swap-rate i {
            margin: 0 6px;
        }

        /* Premium SWAP Button - Lock/Unlock */
        .btn-swap {
            width: 100%;
            background: linear-gradient(145deg, #f1c40f, #d4ac0d);
            border: none;
            border-radius: 60px;
            padding: 18px;
            font-weight: 800;
            font-size: 16px;
            color: #1a2a1a;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-swap::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s;
        }
        .btn-swap:hover::before {
            left: 100%;
        }
        .btn-swap:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: linear-gradient(145deg, #4a5a4a, #3a4a3a);
            color: #8a9a8a;
            transform: none;
        }
        .btn-swap:disabled:hover::before {
            left: -100%;
        }
        .btn-swap:active:not(:disabled) {
            transform: scale(0.97);
        }

        /* Locked State Styling */
        .btn-swap.locked {
            background: linear-gradient(145deg, #4a5a4a, #3a4a3a);
            color: #8a9a8a;
        }
        .btn-swap.locked i {
            color: #e74c3c;
        }
        .btn-swap.unlocked {
            background: linear-gradient(145deg, #f1c40f, #d4ac0d);
            color: #1a2a1a;
        }
        .btn-swap.unlocked i {
            color: #2ecc71;
        }

        /* Status Messages */
        .status-msg {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 24px;
            padding: 14px;
            font-size: 13px;
            text-align: center;
            margin: 16px 0 0;
            display: none;
            animation: slideIn 0.3s ease;
            font-weight: 500;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .status-msg.success {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.4);
        }
        .status-msg.error {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.4);
        }
        .status-msg.info {
            background: rgba(52, 152, 219, 0.15);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.4);
        }

        /* Withdraw Section */
        .withdraw-box {
            padding: 24px;
            margin-top: 8px;
            margin-bottom: 20px;
            border-radius: 40px;
            border-top: 2px solid rgba(46, 204, 113, 0.2);
        }
        .withdraw-box h3 {
            font-size: 17px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f1c40f;
            font-weight: 700;
        }
        .withdraw-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(46, 204, 113, 0.25);
            border-radius: 28px;
            padding: 16px 20px;
            color: white;
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .withdraw-input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.1);
            background: rgba(0, 0, 0, 0.55);
        }
        .btn-withdraw {
            width: 100%;
            background: linear-gradient(145deg, #e67e22, #d35400);
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-withdraw:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(230, 126, 34, 0.25);
        }
        .btn-withdraw:active {
            transform: scale(0.97);
        }

        /* Utilities */
        .hidden { display: none; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        @media (max-width: 450px) {
            body { padding: 12px; }
            .balance-card .value { font-size: 24px; }
            .swap-input-row input { font-size: 26px; }
            .token-badge { padding: 8px 16px; font-size: 13px; }
            .swap-input-group { padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    
    <div class="container">
        
        <!-- Header -->
        <div class="header">
            <h1>⚡ AXION DEX</h1>
            <p>Swap AXC ↔ USDT • Instant • Low Fee</p>
        </div>

        <!-- Wallet Connection -->
        <div class="glass-card wallet-section">
            <div class="wallet-info">
                <div class="wallet-icon"><i class="fab fa-telegram-plane"></i></div>
                <div class="wallet-text">
                    <h4>TON Wallet</h4>
                    <p id="walletStatus">Not connected</p>
                </div>
            </div>
            <div id="ton-connect"></div>
        </div>

        <!-- Balances -->
        <div class="balance-row">
            <div class="glass-card balance-card axc">
                <div class="icon"><i class="fas fa-gem"></i></div>
                <div class="label">AXC Balance</div>
                <div class="value" id="axcBalance">0</div>
            </div>
            <div class="glass-card balance-card usdt">
                <div class="icon"><i class="fas fa-dollar-sign"></i></div>
                <div class="label">USDT Balance</div>
                <div class="value" id="usdtBalance">$0.00</div>
            </div>
        </div>

        <!-- Swap Interface -->
        <div class="glass-card swap-box" id="swapBox">
            <div class="swap-input-group">
                <div class="swap-label">
                    <span><i class="fas fa-arrow-up"></i> You Pay</span>
                    <span>Balance: <span id="fromBalance">0</span> AXC</span>
                </div>
                <div class="swap-input-row">
                    <input type="number" id="swapFrom" placeholder="0" step="1">
                    <div class="token-badge"><i class="fas fa-gem"></i> AXC</div>
                </div>
            </div>

            <div class="swap-arrow">
                <span class="line"></span>
                <i class="fas fa-arrow-down"></i>
                <span class="line"></span>
            </div>

            <div class="swap-input-group">
                <div class="swap-label">
                    <span><i class="fas fa-arrow-down"></i> You Receive</span>
                    <span>Balance: <span id="toBalance">$0.00</span> USDT</span>
                </div>
                <div class="swap-input-row">
                    <input type="text" id="swapTo" placeholder="0.00" readonly>
                    <div class="token-badge"><i class="fas fa-dollar-sign"></i> USDT</div>
                </div>
            </div>

            <div class="swap-rate">
                <i class="fas fa-chart-line"></i> 1 AXC = $<span id="axcPrice">0.0099</span> USDT
                <i class="fas fa-coins" style="margin-left: 12px;"></i> Fee: 0.05 TON (one‑time)
            </div>

            <button class="btn-swap locked" id="swapBtn" disabled>
                <i class="fas fa-lock"></i> CONFIRM SWAP
            </button>

            <div id="swapStatus" class="status-msg"></div>
        </div>

        <!-- Withdraw USDT Section -->
        <div class="glass-card withdraw-box">
            <h3><i class="fas fa-money-bill-wave"></i> Withdraw USDT</h3>
            <input type="text" id="withdrawAddress" class="withdraw-input" placeholder="BEP20 Address (0x...)" autocomplete="off">
            <input type="number" id="withdrawAmount" class="withdraw-input" placeholder="Amount in USDT" step="0.01">
            <button class="btn-withdraw" id="withdrawBtn">
                <i class="fas fa-paper-plane"></i> Submit Withdrawal
            </button>
            <div id="withdrawStatus" class="status-msg"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
